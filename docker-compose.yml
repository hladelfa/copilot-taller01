services:
  backend:
    build:
      context: ./backend
    container_name: jwt-fastapi-backend
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY before running docker compose}
      ADMIN_USERNAME: ${ADMIN_USERNAME:?Set ADMIN_USERNAME before running docker compose}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD before running docker compose}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://backend:8000
    container_name: compliance-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
